<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Website Kenangan</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
  background: radial-gradient(circle at center, #2a0a3d, #0a0615);
}

/* BINTANG */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.2;
}

/* SLIDE */
.slide {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  transition: 1s;
}

.active {
  opacity: 1;
  z-index: 2;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  color: white;
  cursor: pointer;
}

/* PLAYLIST */
.music-container {
  display: flex;
  gap: 30px;
  margin-top: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  width: 200px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.cover {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.cover1 { background: linear-gradient(135deg, #ff6ec4, #ff3cac); }
.cover2 { background: linear-gradient(135deg, #7873f5, #ff6ec4); }
.cover3 { background: linear-gradient(135deg, #ff4e50, #f00000); }

.activeCard {
  box-shadow: 0 0 20px #ff6ec4;
}

.next-btn {
  position: absolute;
  bottom: 30px;
  right: 40px;
  cursor: pointer;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <h1>Hai Chella</h1>
  <p>Our memories are something that will keep going forever.</p>
  <button onclick="goToSlide2()">Lihat Cerita Kita</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">

  <h1>Pilih Lagu 🎶</h1>

  <div class="music-container">

    <div class="card" onclick="playSong('perfect')" id="card-perfect">
      <div class="cover cover1"></div>
      <h3>Perfect</h3>
      <p>Ed Sheeran</p>
      <button id="btn-perfect">Play</button>
    </div>

    <div class="card" onclick="playSong('ilysb')" id="card-ilysb">
      <div class="cover cover2"></div>
      <h3>ILYSB</h3>
      <p>LANY</p>
      <button id="btn-ilysb">Play</button>
    </div>

    <div class="card" onclick="playSong('iniabadi')" id="card-iniabadi">
      <div class="cover cover3"></div>
      <h3>Ini Abadi</h3>
      <p>Perunggu</p>
      <button id="btn-iniabadi">Play</button>
    </div>

  </div>

  <div class="next-btn">Next →</div>

</div>

<!-- AUDIO -->
<audio id="audio-perfect" src="music/perfect.mp3"></audio>
<audio id="audio-ilysb" src="music/ilysb.mp3"></audio>
<audio id="audio-iniabadi" src="music/iniabadi.mp3"></audio>

<script>
let songs = {
  perfect: document.getElementById("audio-perfect"),
  ilysb: document.getElementById("audio-ilysb"),
  iniabadi: document.getElementById("audio-iniabadi")
};

/* TRANSISI SLIDE */
function goToSlide2() {
  document.getElementById("slide1").classList.remove("active");

  setTimeout(() => {
    document.getElementById("slide2").classList.add("active");
  }, 500);
}

/* PLAY LAGU */
function playSong(name) {

  for (let key in songs) {
    songs[key].pause();
    songs[key].currentTime = 0;

    document.getElementById("btn-" + key).innerText = "Play";
    document.getElementById("card-" + key).classList.remove("activeCard");
  }

  songs[name].play();

  document.getElementById("btn-" + name).innerText = "Playing...";
  document.getElementById("card-" + name).classList.add("activeCard");
}
</script>

</body>
</html>
