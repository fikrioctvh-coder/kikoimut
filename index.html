<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Kenangan</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  overflow: hidden;
  color: white;
  background: radial-gradient(circle at center, #2a0a3d, #0a0615);
}

/* BINTANG */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity:0.25;
}

/* SLIDE */
.slide {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:0.8s;
}

.slide.active {
  opacity:1;
  pointer-events:all;
}

/* SLIDE 1 */
#slide1 h1 {
  font-size:50px;
  background: linear-gradient(90deg,#ff6ec4,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn {
  margin-top:25px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ff6ec4,#7873f5);
  color:white;
  cursor:pointer;
}

/* SLIDE 2 */
.music-container {
  display:flex;
  gap:25px;
  margin-top:30px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  width:200px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {transform:translateY(-8px);}

.cover {
  height:120px;
  border-radius:12px;
  margin-bottom:10px;
}

.cover1 {background:linear-gradient(135deg,#ff6ec4,#ff3cac);}
.cover2 {background:linear-gradient(135deg,#7873f5,#ff6ec4);}
.cover3 {background:linear-gradient(135deg,#ff4e50,#f00000);}

/* SLIDE 3 */
.story-container {
  display:flex;
  gap:60px;
  align-items:center;
}

.story-left {
  text-align:left;
  max-width:350px;
}

.chapter {
  font-size:12px;
  color:rgba(255,255,255,0.4);
  margin-bottom:10px;
}

.story-left h2 {
  font-size:28px;
  font-weight:800;
}

.desc {
  font-size:14px;
  color:rgba(255,255,255,0.5);
  margin-top:10px;
}

.story-img {
  width:280px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,110,196,0.3);
  animation:float 6s ease-in-out infinite;
}

@keyframes float {
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

.next-btn {
  position:absolute;
  bottom:30px;
  right:40px;
  opacity:0.6;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
  <h1>Website Kenangan</h1>
  <p>Untuk Kamu dan Dia</p>
  <button class="btn" onclick="goToSlide2()">Mulai</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
  <h1>Pilih Lagu 🎶</h1>

  <div class="music-container">
    <div class="card" onclick="playSong('perfect')">
      <div class="cover cover1"></div>
      <h3>Perfect</h3>
      <p>Ed Sheeran</p>
    </div>

    <div class="card" onclick="playSong('ilysb')">
      <div class="cover cover2"></div>
      <h3>ILYSB</h3>
      <p>LANY</p>
    </div>

    <div class="card" onclick="playSong('iniabadi')">
      <div class="cover cover3"></div>
      <h3>Ini Abadi</h3>
      <p>Perunggu</p>
    </div>
  </div>

  <div class="next-btn" onclick="goToSlide3()">Next →</div>
</div>

<!-- SLIDE 3 -->
<div class="slide" id="slide3">

  <div class="story-container">

    <div class="story-left">
      <div class="chapter">Chapter 1</div>
      <h2>This is where the story begins</h2>
      <p class="desc">A simple start, with a lasting meaning</p>
    </div>

    <div class="story-right">
      <img src="fotoig.jpeg" class="story-img">
    </div>

  </div>

  <div class="next-btn" id="next3" style="display:none">
    Next →
  </div>

</div>

<!-- AUDIO -->
<audio id="perfect" src="music/perfect.mp3"></audio>
<audio id="ilysb" src="music/ilysb.mp3"></audio>
<audio id="iniabadi" src="music/iniabadi.mp3"></audio>

<script>
function goToSlide2(){
  document.getElementById('slide1').classList.remove('active');
  setTimeout(()=>document.getElementById('slide2').classList.add('active'),400);
}

function goToSlide3(){
  document.getElementById('slide2').classList.remove('active');
  setTimeout(()=>{
    document.getElementById('slide3').classList.add('active');

    setTimeout(()=>{
      document.getElementById('next3').style.display='block';
    },3000);

  },400);
}

function playSong(name){
  let songs=['perfect','ilysb','iniabadi'];

  songs.forEach(id=>{
    let audio=document.getElementById(id);
    audio.pause();
    audio.currentTime=0;
  });

  document.getElementById(name).play();
}
</script>

</body>
</html>
