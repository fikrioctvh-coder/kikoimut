<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FikriForger</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
}

nav h1 {
  color: #a855f7;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Hero */
.hero {
  text-align: center;
  margin-top: 100px;
}

.hero h1 {
  font-size: 50px;
  line-height: 1.2;
}

.hero span {
  color: #3b82f6;
}

.hero p {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.8;
}

/* Button */
.btn {
  margin-top: 30px;
  padding: 12px 25px;
  background: #9333ea;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* FOTO */
.photo {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.photo img {
  width: 300px;
  border-radius: 20px;
  transition: 0.3s;
  cursor: pointer;
}

.photo img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #9333ea;
}
</style>
</head>

<body>

<nav>
  <h1>FikriForger</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Project</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>
    HAI BUBIB <br>
    <span>AKU NGETES DOANG</span>
  </h1>

  <p>HAI BUBIB .</p>

  <button class="btn">Mulai Sekarang</button>
</section>

<div class="photo">
  <a href="https://www.instagram.com/fikriforger/" target="_blank">
    <img src="foto.jpeg" alt="Fikri">
  </a>
</div>

</body>
</html>
